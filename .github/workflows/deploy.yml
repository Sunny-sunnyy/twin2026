# Workflow deploy chính của project.
# Ghi chú tiếng Việt:
# - Workflow này dùng để triển khai hạ tầng + frontend lên AWS.
# - Có 2 cách chạy:
#   1. Tự động khi push lên nhánh main
#   2. Chạy tay từ tab Actions để chọn environment
name: Deploy Digital Twin

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

# Quyền tối thiểu cho workflow.
# `id-token: write` là bắt buộc để GitHub Actions xin OIDC token
# và assume IAM role trong AWS mà không cần access key tĩnh.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # Nếu không có input từ workflow_dispatch thì mặc định deploy `dev`.
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        # Tải source code của repo xuống runner để các bước sau có file mà chạy.
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        # Step này là chỗ GitHub Actions assume role AWS qua OIDC.
        # Role ARN lấy từ repository secret AWS_ROLE_ARN.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Set up Python
        # Backend packaging đang dùng Python nên runner cần Python runtime.
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        # `uv` được dùng trong backend/deploy.py để build package Lambda.
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Terraform
        # Cài Terraform CLI cho runner.
        # terraform_wrapper=false giúp lấy output thô, đỡ vướng định dạng wrapper.
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false  # Important: disable wrapper to get raw outputs

      - name: Setup Node.js
        # Frontend Next.js static export cần Node.js để cài package và build.
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run Deployment Script
        # Giao toàn bộ logic deploy cho scripts/deploy.sh:
        # - build Lambda package
        # - terraform apply
        # - build frontend
        # - sync frontend lên S3
        run: |
          # Set environment variables for the script
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export DEFAULT_AWS_REGION=${{ secrets.DEFAULT_AWS_REGION }}
          
          # Make script executable and run it
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh ${{ github.event.inputs.environment || 'dev' }}
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          
      - name: Get Deployment URLs
        # Đọc output từ Terraform để workflow biết URL nào vừa được deploy.
        # Các giá trị này sẽ dùng cho summary và bước invalidate CloudFront.
        id: deploy_outputs
        working-directory: ./terraform
        run: |
          terraform workspace select ${{ github.event.inputs.environment || 'dev' }}
          echo "cloudfront_url=$(terraform output -raw cloudfront_url)" >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw s3_frontend_bucket)" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront
        # CloudFront có cache, nên sau khi upload frontend mới cần invalidation
        # để user thấy bản mới ngay thay vì bản cũ trong edge cache.
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?DomainName=='${{ steps.deploy_outputs.outputs.frontend_bucket }}.s3-website-${{ secrets.DEFAULT_AWS_REGION }}.amazonaws.com']].Id | [0]" \
            --output text)
          
          if [ "$DISTRIBUTION_ID" != "None" ] && [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $DISTRIBUTION_ID \
              --paths "/*"
          fi

      - name: Deployment Summary
        # In nhanh các thông tin quan trọng ngay trên log workflow.
        run: |
          echo "✅ Deployment Complete!"
          echo "🌐 CloudFront URL: ${{ steps.deploy_outputs.outputs.cloudfront_url }}"
          echo "📡 API Gateway: ${{ steps.deploy_outputs.outputs.api_url }}"
          echo "🪣 Frontend Bucket: ${{ steps.deploy_outputs.outputs.frontend_bucket }}"
